      overlayLayers: &OVERLAYLAYERS !staticLayers
        default:
          layers:
            - type: grid
              gridType: points
              numberOfLines: [ 5, 3]
              renderAsSvg: true
              labelColor: black
              haloColor: rgba(255,255,255,0)
              haloRadius: -5
              labelProjection: EPSG:2154
              gridColor: rgba(0,0,0,0)
              indent: 10
              font:
                name: ["DejaVu Sans"]
                size: 9
                style: PLAIN
    processors:
      - !reportBuilder # compile all reports in current directory
        directory: '.'
      - !addBackgroundLayers
        inputMapper:
          backgroundLayers: staticLayers
          map: map
      - !addOverlayLayers
        inputMapper:
          overlayLayers: staticLayers
          map: map
      - !configureHttpRequests
        httpProcessors:
          - !addHeaders
            headers:
              Referer : "@@referer@@"
      - !createMap {}
      - !createScalebar {}
  #===========================================================================
  A4_folioPaysage: !template
  #===========================================================================
    reportTemplate: A4_folioPaysage.jrxml
    tableData: jrDataSource
    attributes:
      att_pointList: !string {default : ''}
      att_numConsultation: !string {default : ''}
      att_idChantier: !string {default : ''}
      att_idDocumentDemande: !string {default : ''}
      att_refChantier: !string {default : ''}
      att_chantierCommune: !string {default : ''}
      att_emetteurAdresse: !string {default : ''}
      att_emetteurComplet: !string {default : ''}
      att_chantierAdresseComplete: !string {default : ''}
      att_destinataireAdresse: !string {default : ''}
      att_chantierAdresse: !string {default : ''}
      att_destinatairePrenom: !string {default : ''}
      att_emetteurPrenom: !string {default : ''}
      att_chantierCodePostal: !string {default : ''}
      att_destinataireNom: !string {default : ''}
      att_emetteurNom: !string {default : ''}
      att_destinataireComplet: !string {default : ''}
      att_pointList: !string {default : ''}
      map: *MAP
      scalebar: *SCALEBAR
      paging: !paging
        default:
          scale: 2000
          overlap: 0
          renderPagingOverview: true
          pagingOverviewStyle: {
              "version": "2",
              "*": {
                "symbolizers": [
                  {
                    "strokeColor": "#000000",
                    "strokeDashstyle": "solid",
                    "strokeOpacity": 1,
                    "strokeWidth": 1,
                    "fillColor": "#0000FF",
                    "fillOpacity": 0.1,
                    "type": "line"
                  },
                  {
                    "type": "text",
                    "label": "[strReplace(name+1,'\\.0','',true)]",
                    "haloRadius" : 1,
                    "haloColor" : "#FFFFFF",
                    "fontColor" : "#000000",
                    "fontFamily" : "DejaVu Sans"
                  }
                ]
              }
            }
      backgroundLayers: *BACKGROUNDLAYERS
      overlayLayers: *OVERLAYLAYERS
    processors:
      - !reportBuilder # compile all reports in current directory
        directory: '.'
      - !addBackgroundLayers
        inputMapper:
          backgroundLayers: staticLayers
          map: map
      - !addOverlayLayers
        inputMapper:
          overlayLayers: staticLayers
          map: map
      - !configureHttpRequests
        httpProcessors:
          - !addHeaders
            headers:
              Referer : "@@referer@@"
      - !createMapPages {}
      - !createMap {}
      - !createScalebar {}
      - !createDataSource
        attributes:
          scalebar: *SCALEBAR
        processors:
          - !createMap {}
          - !createScalebar {}
