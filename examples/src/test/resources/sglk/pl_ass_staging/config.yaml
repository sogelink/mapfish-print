      att_pointList: !string {default : ''}
      map: &MAP !map
        maxDpi: 400
        width: 802
        height: 472
        zoomLevelSnapStrategy: HIGHER_SCALE
        zoomLevels: &ZOOMLEVELS !zoomLevels
          scales: [ 500, 1000, 2000, 5000, 7500, 10000, 20000, 50000, 75000 , 100000, 250000, 500000, 750000, 1000000, 2500000, 5000000, 7500000, 10000000, 25000000, 50000000, 75000000, 100000000]
        default:
            useNearestScale: true
            dpi: 250
            longitudeFirst: true
            rotation : 0
#            zoomToFeatures:
#                minScale: 1000
#                minMargin: 10
#                zoomType: extent
#                layer: emprise
      scalebar: &SCALEBAR !scalebar
        width: 88
        height: 20
        default:
          type: bar_sub
          intervals: 5
          fontSize: 6
          lineWidth: 1
          barSize: 5
          renderAsSvg: true
          geodetic: true
          align: "center"
      backgroundLayers: &BACKGROUNDLAYERS !staticLayers
